name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            apps/backend/pyproject.toml
            nodes/pi-camera/pyproject.toml
      - name: Install Python dependencies
        run: python -m pip install -e '.[dev]' -e apps/backend -e nodes/pi-camera
      - name: Run Python tests
        run: pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run web tests
        run: npm run test:web
      - name: Typecheck web
        run: npm run typecheck:web
      - name: Build web app
        run: npm run build:web

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck E2E harness
        run: npm run typecheck:e2e
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke
        run: npm run test:e2e

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install PlatformIO
        run: python -m pip install platformio
      - name: Build ESP32 firmware
        run: pio run -d firmware/esp32-controller
      - name: Run native firmware tests
        run: pio test -d firmware/esp32-controller -e native

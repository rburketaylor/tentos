services:
  backend:
    build:
      context: ../../..
      dockerfile: deploy/compose/home-server/backend.Dockerfile
    environment:
      GROW_REPOSITORY_MODE: ${GROW_REPOSITORY_MODE:-seeded}

  web:
    build:
      context: ../../..
      dockerfile: deploy/compose/home-server/web.Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend

services:
  broker:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grow}
      POSTGRES_USER: ${POSTGRES_USER:-grow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../../..
      dockerfile: deploy/compose/home-server/backend.Dockerfile
    environment:
      MQTT_BROKER_URL: mqtt://broker:1883
      DATABASE_URL: postgresql://${POSTGRES_USER:-grow}:${POSTGRES_PASSWORD:-grow}@db:5432/${POSTGRES_DB:-grow}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - broker
      - db

  web:
    build:
      context: ../../..
      dockerfile: deploy/compose/home-server/web.Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  postgres-data:
